spring:
  application:
    name: spring-ai-zoujiahui

  ai:
    # DeepSeek 专用配置
    model:
      embedding: ollama  # 使用 Ollama 作为嵌入模型
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}  # 从环境变量读取
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
          temperature: 0.7

    # Ollama 配置（用于嵌入）
    ollama:
      base-url: http://ollama:11434
      init:
        pull-model-strategy: never   # 改为 never，禁止自动下载
      embedding:
        options:
          model: nomic-embed-text     # 确保用的是嵌入模型，不是 mistral

    # Redis 向量存储配置
    vectorstore:
      redis:
        initialize-schema: true
        index-name: my-knowledge
        prefix: "doc:"

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

logging:
  file:
    name: ./logs/spring-ai.log

server:
  address: 0.0.0.0
  port: 8080