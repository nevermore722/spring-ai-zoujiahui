<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>林深 - 你的专属男友</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { height: 100%; margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, #fdfbfb 0%, #ebedee 100%);
            z-index: -2;
        }
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.4) 0%, transparent 100%);
            backdrop-filter: blur(4px);
            z-index: -1;
        }
        .chat-bubble { position: relative; max-width: 75%; padding: 10px 14px; border-radius: 8px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .bubble-ai { background: white; color: #111; margin-left: 12px; border-radius: 4px 12px 12px 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .bubble-user { background: #95ec69; color: #111; margin-right: 12px; border-radius: 12px 4px 12px 12px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .bubble-ai::before { content: ""; position: absolute; left: -8px; top: 10px; border-width: 4px 8px 4px 0; border-style: solid; border-color: transparent white transparent transparent; }
        .bubble-user::after { content: ""; position: absolute; right: -8px; top: 10px; border-width: 4px 0 4px 8px; border-style: solid; border-color: transparent transparent transparent #95ec69; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .typing-dot { width: 4px; height: 4px; background: #999; border-radius: 50%; display: inline-block; animation: blink 1.4s infinite both; margin: 0 1px; }
        @keyframes blink { 0%, 100% { opacity: .2; } 20% { opacity: 1; } }

        /* 模式切换开关样式 */
        .mode-switch {
            background: #e8e8e8;
            border-radius: 30px;
            padding: 3px;
            display: flex;
            gap: 4px;
        }
        .mode-option {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-option.active {
            background: #07c160;
            color: white;
        }
        .mode-option:not(.active) {
            color: #666;
        }
    </style>
</head>
<body class="flex flex-col bg-gray-100">
<div class="bg-container"></div>
<div class="bg-overlay"></div>

<header class="flex items-center justify-between px-4 py-3 bg-white/80 backdrop-blur border-b border-gray-200 sticky top-0 z-10">
    <a href="/" class="text-gray-600 text-lg">〈</a>
    <div class="text-center">
        <div class="font-bold text-gray-800">林深 👔</div>
        <div class="text-[10px] text-green-500">● 对方正在想你</div>
    </div>
    <!-- 模式切换按钮放在右上角 -->
    <div class="mode-switch">
        <span class="mode-option active" data-mode="normal">普通</span>
        <span class="mode-option" data-mode="rag">智能</span>
    </div>
</header>

<main id="chatBox" class="flex-1 overflow-y-auto p-4 space-y-6 no-scrollbar"></main>

<footer class="bg-[#f7f7f7] border-t border-gray-200 p-3 pb-8">
    <div class="flex items-end gap-3">
        <textarea id="userInput" rows="1" class="flex-1 bg-white border-none rounded-lg p-2 text-sm focus:ring-1 focus:ring-green-500 resize-none overflow-hidden" placeholder="想对他说什么..."></textarea>
        <button id="actionBtn" onclick="handleAction()" class="bg-[#07c160] text-white px-4 py-2 rounded-lg text-sm font-medium transition-all active:opacity-70">
            你先说
        </button>
        <button id="stopBtn" onclick="stopGenerating()" class="hidden bg-white border border-gray-200 text-gray-700 px-3 py-2 rounded-lg text-sm font-medium transition-all active:opacity-70">
            <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="6" y="6" width="12" height="12" rx="2"></rect>
            </svg>
        </button>
    </div>
</footer>

<script>
    // ==================== 新增：模式切换 ====================
    let currentMode = 'normal';  // 'normal' 或 'rag'

    // 获取API地址
    function getApiUrl() {
        return currentMode === 'normal' ? '/ai/app/boyfriend' : '/ai/app/boyfriend/rag';
    }

    // 绑定模式切换事件
    const modeOptions = document.querySelectorAll('.mode-option');
    modeOptions.forEach(opt => {
        opt.addEventListener('click', function() {
            if (isStreaming) {
                alert('请等待当前对话结束后再切换模式');
                return;
            }
            modeOptions.forEach(o => o.classList.remove('active'));
            this.classList.add('active');
            currentMode = this.dataset.mode;
        });
    });

    // ==================== 原有逻辑（基本不变，只改了API地址）====================
    let interactionLocked = false;
    let isStreaming = false;
    let abortController = null;
    const chatBox = document.getElementById('chatBox');
    const userInput = document.getElementById('userInput');
    const actionBtn = document.getElementById('actionBtn');
    const stopBtn = document.getElementById('stopBtn');
    const chatId = 'boy_' + Math.random().toString(36).substr(2, 9);

    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = (this.scrollHeight) + 'px';

        if (interactionLocked || this.value.trim().length > 0) {
            actionBtn.innerText = "发送";
        } else {
            actionBtn.innerText = "你先说";
        }
    });

    async function handleAction() {
        if (isStreaming) return;
        const text = userInput.value.trim();
        const currentBtnText = actionBtn.innerText;

        interactionLocked = true;
        actionBtn.innerText = "发送";

        if (currentBtnText === "你先说" && text === "") {
            await sendRequest("跟我说说话吧。");
        } else if (text !== "") {
            appendMessage('user', text);
            userInput.value = '';
            userInput.style.height = 'auto';
            await sendRequest(text);
        }
    }

    async function sendRequest(msg) {
        if (isStreaming) return;
        const wrapper = appendMessage('ai', '');
        const contentDiv = wrapper.querySelector('.content');
        contentDiv.innerHTML = '<span class="typing-dot"></span><span class="typing-dot" style="animation-delay: 0.2s"></span><span class="typing-dot" style="animation-delay: 0.4s"></span>';

        try {
            isStreaming = true;
            userInput.disabled = true;
            actionBtn.disabled = true;
            actionBtn.style.opacity = '0.7';
            stopBtn.classList.toggle('hidden', false);

            abortController = new AbortController();
            // 关键修改：使用动态API地址
            const url = `${getApiUrl()}?chatId=${chatId}&message=${encodeURIComponent(msg)}`;
            const response = await fetch(url, { signal: abortController.signal });
            if (!response.ok) {
                let errText = '';
                try {
                    errText = await response.text();
                } catch (_) {}
                throw new Error(errText || '命中敏感内容');
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            contentDiv.innerText = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;
                contentDiv.innerText += decoder.decode(value);
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        } catch (err) {
            console.error(err);
            if (err && err.name === 'AbortError') {
                contentDiv.innerHTML = '<span class="text-gray-600 text-[10px]">已停止发送。</span>';
            } else {
                const msg = (err && err.message) ? err.message : '林深去忙了，稍后再试';
                contentDiv.textContent = msg;
                contentDiv.style.color = '#ef4444';
            }
        } finally {
            isStreaming = false;
            abortController = null;
            userInput.disabled = false;
            actionBtn.disabled = false;
            actionBtn.style.opacity = '1';
            stopBtn.classList.toggle('hidden', true);
        }
    }

    function stopGenerating() {
        if (!isStreaming) return;
        if (abortController) abortController.abort();
    }

    function appendMessage(role, text) {
        const wrapper = document.createElement('div');
        wrapper.className = `flex ${role === 'user' ? 'justify-end' : 'justify-start'} mb-4 items-start`;

        const avatar = document.createElement('img');
        avatar.className = `w-10 h-10 rounded-md object-cover flex-shrink-0 shadow-sm`;
        avatar.src = role === 'ai' ? '/boy.jfif' : '/girl.jfif';

        const bubble = document.createElement('div');
        bubble.className = `chat-bubble ${role === 'ai' ? 'bubble-ai' : 'bubble-user'}`;

        const content = document.createElement('div');
        content.className = 'content';
        content.innerText = text;
        bubble.appendChild(content);

        if (role === 'ai') {
            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
        } else {
            wrapper.appendChild(bubble);
            wrapper.appendChild(avatar);
        }

        chatBox.appendChild(wrapper);
        chatBox.scrollTop = chatBox.scrollHeight;
        return wrapper;
    }
</script>
</body>
</html>
